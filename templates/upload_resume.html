<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4">📄 Upload Resume</h2>

                <!-- Selected Job -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h4>{{ job.title }}</h4>
                        <p class="mb-1">
                            <strong>Company:</strong> {{ job.company }}
                        </p>
                        <p class="mb-0">
                            <strong>Location:</strong>
                            {{ job.location if job.location else "Remote / Not Specified" }}
                        </p>
                    </div>
                </div>

                <!-- Upload Form -->
                <form
                    action="{{ url_for('upload_resume', job_id=job.id) }}"
                    method="POST"
                    enctype="multipart/form-data"
                >

                    <div class="mb-3">
                        <label class="form-label">
                            Select Resume (PDF)
                        </label>

                        <input
                            type="file"
                            name="resume"
                            class="form-control"
                            accept=".pdf"
                            required
                        >
                    </div>

                    <button
                        type="submit"
                        class="btn btn-success"
                    >
                        🤖 Analyze Resume
                    </button>

                    <a
                        href="{{ url_for('index') }}"
                        class="btn btn-secondary"
                    >
                        Cancel
                    </a>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
