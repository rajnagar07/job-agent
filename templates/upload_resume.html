<!DOCTYPE html>

<html>

<head>

    <title>Upload Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="card shadow">

            <div class="card-body">

                <h2>Upload Resume</h2>

               <form
    action="{{ url_for('upload_resume', job_id=job.id) }}"
    method="POST"
    enctype="multipart/form-data"
>

                    <input type="file" name="resume" class="form-control mb-3" accept=".pdf">

                    <button class="btn btn-primary">

                        Upload Resume

                    </button>
                    <div class="card mb-4">
    <div class="card-body">
        <h4>{{ job.title }}</h4>
        <p class="mb-1"><strong>Company:</strong> {{ job.company }}</p>
        <p class="mb-0"><strong>Location:</strong> {{ job.location }}</p>
    </div>
</div>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
